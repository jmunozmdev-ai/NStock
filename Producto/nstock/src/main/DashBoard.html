<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N-Stock | Panel Integral</title>
    <style>
        :root { --primary: #6200ee; --secondary: #03dac6; --bg: #f0f2f5; --accent: #ff9800; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 30px; }
        
        /* Layout en 3 columnas */
        .grid { display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 20px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #444; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        input { padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        
        .btn-search { background: var(--accent); }
        .btn-sell { background: var(--primary); }
        .btn-refresh { background: #eee; color: #333; margin-bottom: 10px; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Estilos de tabla y resultados */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        
        .result-box { margin-top: 15px; padding: 15px; border-radius: 8px; background: #f9f9f9; border-left: 5px solid var(--accent); min-height: 50px; }
        .badge { background: #e8e0ff; color: #6200ee; padding: 3px 8px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📦 N-Stock: Gestión de Inventario </h1>
    </div>

    <div class="grid">
        
        <div class="card">
            <h2>🔍 Consultor de Precios</h2>
            <p style="font-size: 0.8rem; color: #666;">Ingresa el código de barras (EAN-13)</p>
            <input type="text" id="scanInput" placeholder="780..." onkeypress="if(event.key==='Enter') consultarPrecio()">
            <button class="btn btn-search" onclick="consultarPrecio()">CONSULTAR PRODUCTO</button>
            
            <div id="infoProducto" class="result-box">
                <i>Esperando escaneo...</i>
            </div>
        </div>

        <div class="card">
            <h2>🛒 Carrito de Compras</h2>
            <ul id="listaCarrito" style="list-style: none; padding: 0; margin-bottom: 15px; max-height: 150px; overflow-y: auto;">
                <li style="color: #666; font-size: 0.9rem;">Esperando productos...</li>
            </ul>
            <div style="font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                Total a Cobrar: $<span id="totalCarrito">0</span>
            </div>
            <button class="btn btn-sell" onclick="realizarVenta()">💸 COBRAR Y REGISTRAR</button>
            <div id="mensajeVenta" style="margin-top: 15px; font-weight: bold;"></div>
        </div>

        <div class="card">
            <h2>📊 Stock en Bodega</h2>
            <button class="btn btn-refresh" onclick="cargarInventario()">🔄 Actualizar Datos</button>
            <table id="tablaInventario">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Producto</th>
                        <th>Stock</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

    </div>
</div>

<script>
    const API_BASE = "/api";
    let carrito = []; // Memoria temporal del carrito

    // --- 1. CONSULTAR PRECIO Y AGREGAR AL CARRITO ---
    async function consultarPrecio() {
        const input = document.getElementById('scanInput');
        const codigo = input.value.trim();
        const box = document.getElementById('infoProducto');
        
        if (!codigo) return;

        try {
            const res = await fetch(`${API_BASE}/productos/buscar?codigo=${codigo}`);
            const data = await res.json();

            if (res.ok) {
                // Mostrar en el cuadro azul
                box.style.borderLeftColor = "var(--accent)";
                box.innerHTML = `
                    <h3 style="margin:0">${data.nombre}</h3>
                    <p style="font-size: 1.5rem; color: var(--primary); margin: 10px 0;">$${data.precio}</p>
                    <span class="badge">${data.categoria}</span>
                `;
                
                // Agregar automáticamente a la lista de cobro
                agregarAlCarrito(data);

                // Limpiar la caja y dejarla lista para el siguiente disparo
                input.value = '';
                input.focus(); 

            } else {
                box.style.borderLeftColor = "red";
                box.innerHTML = `<b style="color:red">❌ Producto no encontrado</b>`;
                input.value = ''; 
                input.focus();
            }
        } catch (err) {
            box.innerHTML = "Error de conexión";
        }
    }

    // --- 2. GESTIÓN DEL CARRITO VISUAL ---
    function agregarAlCarrito(producto) {
        let itemExistente = carrito.find(item => item.idProducto === producto.idProducto);
        
        if (itemExistente) {
            itemExistente.cantidad += 1;
        } else {
            carrito.push({
                idProducto: producto.idProducto,
                nombre: producto.nombre,
                precio: producto.precio,
                cantidad: 1
            });
        }
        actualizarVistaCarrito();
    }

    function actualizarVistaCarrito() {
        const lista = document.getElementById('listaCarrito');
        const totalTexto = document.getElementById('totalCarrito');
        let granTotal = 0;

        if (carrito.length === 0) {
            lista.innerHTML = '<li style="color: #666; font-size: 0.9rem;">Esperando productos...</li>';
            totalTexto.innerText = "0";
            return;
        }

        lista.innerHTML = "";
        carrito.forEach((item) => {
            let subtotal = item.precio * item.cantidad;
            granTotal += subtotal;
            lista.innerHTML += `
                <li style="display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0;">
                    <span><b>${item.cantidad}x</b> ${item.nombre}</span>
                    <span>$${subtotal}</span>
                </li>
            `;
        });

        totalTexto.innerText = granTotal;
    }

    // --- 3. REGISTRAR LA VENTA EN LA NUBE ---
    async function realizarVenta() {
        if (carrito.length === 0) {
            alert("No hay productos en el carrito.");
            return;
        }

        const msg = document.getElementById('mensajeVenta');

        const detallesVenta = carrito.map(item => ({
            idProducto: item.idProducto,
            cantidad: item.cantidad
        }));

        const ventaData = {
            idSucursal: 1,
            idUsuario: 1,
            medioPago: "Efectivo", 
            detalles: detallesVenta
        };

        try {
            const res = await fetch(`${API_BASE}/ventas/registrar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(ventaData)
            });
            const data = await res.json();

            if (res.ok) {
                msg.style.color = "green";
                msg.innerText = `✅ Venta OK: $${data.total}`;
                
                // Resetear todo después de cobrar
                carrito = [];
                actualizarVistaCarrito();
                cargarInventario(); 
                document.getElementById('infoProducto').innerHTML = '<i>Esperando escaneo...</i>';
                
            } else {
                msg.style.color = "red";
                msg.innerText = `❌ Error: ${data.error || 'No se pudo vender'}`;
            }
        } catch (err) { msg.innerText = "Error de conexión"; }
    }

let alertaStockMostrada = false; // Control para que el popup solo salga una vez

    // --- 4. CARGAR LA BODEGA ---
    async function cargarInventario() {
        const tbody = document.querySelector("#tablaInventario tbody");
        
        // SOLUCIÓN UX: Mientras pasan esos 5 segundos, le avisamos al usuario para que no piense que está trabado
        tbody.innerHTML = "<tr><td colspan='3' style='text-align:center; padding: 20px;'>⏳ Conectando con la bodega...</td></tr>";

        try {
            const res = await fetch(`${API_BASE}/inventario`);
            const data = await res.json();
            
            tbody.innerHTML = ""; // Limpiamos el mensaje de "Conectando..."
            let productosCriticos = 0;

            data.forEach(item => {
                let estiloFila = "";
                let icono = "";
                
                // FORZAMOS a que el dato sea un número matemático (A veces el servidor lo manda como texto "5")
                const stock = parseInt(item.stockActual);

                if (stock <= 5) {
                    estiloFila = "background-color: #ffebee; color: #c62828;"; 
                    icono = "⚠️ ";
                    productosCriticos++;
                }

                const row = `<tr style="${estiloFila}">
                    <td><span class="badge">#${item.idProducto}</span></td>
                    <td><b>${icono}</b> ${item.nombreProducto || 'Sin Nombre'}</td>
                    <td><strong>${stock}</strong> un.</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            // SOLUCIÓN ALERTA: Le damos medio segundo de respiro al navegador antes de lanzar el mensaje
            if (productosCriticos > 0 && !alertaStockMostrada) {
                setTimeout(() => {
                    alert(`🚨 ¡Atención! Tienes ${productosCriticos} producto(s) con stock crítico.`);
                }, 500); 
                alertaStockMostrada = true; 
            }

        } catch (err) { 
            tbody.innerHTML = "<tr><td colspan='3' style='color:red; text-align:center;'>❌ Error de conexión con la nube.</td></tr>";
        }
    }
    // Arranque inicial
    cargarInventario();
</script>

</body>
</html>
