spring.application.name=nstock

# El puerto nuevo para evitar el error "Port already in use"
server.port=8081

# La ruta completa (JDBC) hacia tu base de datos en Aiven
spring.datasource.url=jdbc:mysql://mysql-29ec15d0-nstock.l.aivencloud.com:12932/defaultdb?sslMode=REQUIRED
spring.datasource.username=tu_usuario
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl


# Optimización de conexión para bases de datos en la nube (HikariCP)
spring.datasource.hikari.keepalive-time=40000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000